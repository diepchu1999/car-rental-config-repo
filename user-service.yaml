server:
  port: 8081

spring:
  datasource:
    url: jdbc:p6spy:postgresql://localhost:5432/user_db
    username: user
    password: user
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    p6spy: DEBUG
    org.keycloak: DEBUG
    org.keycloak.adapters: DEBUG
    org.springframework.security: DEBUG
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# KEYCLOAK
